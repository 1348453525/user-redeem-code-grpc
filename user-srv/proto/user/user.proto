syntax = "proto3";

package proto;

option go_package = "github.com/1348453525/user-redeem-code-grpc/user-srv/user/proto;proto";

import "google/protobuf/empty.proto";

// 用户服务接口
service User {
  // 注册
  rpc Register(RegisterRequest) returns (UserInfoResponse);

  // 登录
  rpc Login(LoginRequest) returns (LoginResponse);

  // 登出
  // rpc Logout(LoginRequest) returns (CommonResponse);

  // 获取用户信息
  rpc Info(IDRequest) returns (UserInfoResponse);

  // 获取用户列表
  rpc GetList(GetUserListRequest) returns (GetUserListResponse);

  // 更新用户信息
  rpc Update(UpdateUserRequest) returns (google.protobuf.Empty);

  // 删除用户
  rpc Delete(IDRequest) returns (google.protobuf.Empty);
}

// 注册请求
message RegisterRequest {
  string username = 1;       // 用户名
  string password = 2;       // 密码
  string confirm_password = 3; // 确认密码
  string nickname = 4;       // 昵称
  string mobile = 5;         // 手机号
  int32 gender = 6;          // 性别
  string birthday = 7;       // 生日
}

// 用户信息响应
message UserInfoResponse {
  int64 id = 1;             // 用户ID
  string username = 2;       // 用户名
  string nickname = 3;       // 昵称
  string mobile = 4;         // 手机号
  int32 gender = 5;          // 性别
  string birthday = 6;       // 生日
}

// 登录请求
message LoginRequest {
  string username = 1;       // 用户名
  string password = 2;       // 密码
}

// 登录响应
message LoginResponse {
  UserInfoResponse info = 1; // 用户信息
  string token = 2;          // 令牌
}

message IDRequest {
    int64 id = 1;
}

// 获取用户列表请求
message GetUserListRequest {
  int32 page = 1;           // 页码
  int32 page_size = 2;      // 每页大小
}

// 获取用户列表响应
message GetUserListResponse {
  int32 page = 1;                     // 页码
  int32 page_size = 2;                // 每页大小
  int64 total = 3;                    // 总记录数
  repeated UserInfoResponse data = 4; // 用户列表
}

// 更新用户请求
message UpdateUserRequest {
  int64 id = 1;             // 用户ID
  string username = 2;       // 用户名
  string nickname = 3;       // 昵称
  string mobile = 4;         // 手机号
  int32 gender = 5;          // 性别
  string birthday = 6;       // 生日
}
