syntax = "proto3";

package redeem_code;

option go_package = "github.com/1348453525/user-redeem-code-grpc/redeem-code-srv/proto/redeem_code;proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// RedeemCode 服务
service RedeemCode {
  // 创建兑换码批次
  rpc CreateRedeemCodeBatch(CreateRedeemCodeBatchRequest) returns (RedeemCodeBatchResponse) {}
  // 获取兑换码批次详情
  rpc RedeemCodeBatchDetail(IDRequest) returns (RedeemCodeBatchResponse) {}
  // 获取兑换码批次列表
  rpc GetRedeemCodeBatchList(GetListRequest) returns (GetRedeemCodeBatchListResponse) {}
  // 更新兑换码批次
  rpc UpdateRedeemCodeBatch(UpdateRedeemCodeBatchRequest) returns (google.protobuf.Empty) {}
  // 删除兑换码批次
  rpc DeleteRedeemCodeBatch(IDRequest) returns (google.protobuf.Empty) {}

  // 获取兑换码详情
  rpc RedeemCodeDetail(IDRequest) returns (RedeemCodeResponse) {}
  // 获取兑换码列表
  rpc GetRedeemCodeList(GetListRequest) returns (GetRedeemCodeListResponse) {}
  // 更新兑换码
  rpc UpdateRedeemCode(UpdateRedeemCodeRequest) returns (google.protobuf.Empty) {}
  // 删除兑换码
  rpc DeleteRedeemCode(IDRequest) returns (google.protobuf.Empty) {}
  // 使用兑换码
  rpc UseRedeemCode(UseRedeemCodeRequest) returns (google.protobuf.Empty) {}
}

message CreateRedeemCodeBatchRequest {
  string title = 1;
  string description = 2;
  int32 usage_limit = 3;
  int32 total_count = 4;
  string started_at = 5;
  string ended_at = 6;
  int32 status = 7;
  int64 creator_id = 8;
  string creator_name = 9;
}

message RedeemCodeBatchResponse {
  int64 id = 1;
  string title = 2;
  string description = 3;
  int32 usage_limit = 4;
  int32 total_count = 5;
  int32 used_count = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp ended_at = 8;
  int32 status = 9;
  int64 creator_id = 10;
  string creator_name = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message IDRequest {
    int64 id = 1;
}

message GetListRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message GetRedeemCodeBatchListResponse {
  int32 page = 1;
  int32 page_size = 2;
  int64 total = 3;
  repeated RedeemCodeBatchResponse data = 4;
}

message UpdateRedeemCodeBatchRequest {
  int64 id = 1;
  string title = 2;
  string description = 3;
  string started_at = 4;
  string ended_at = 5;
  int32 status = 6;
}

message RedeemCodeResponse {
  int64 id = 1;
  int64 redeem_code_batch_id = 2;
  string title = 3;
  string value = 4;
  int32 usage_limit = 5;
  int32 used_count = 6;
  google.protobuf.Timestamp expiration_at = 7;
  int32 is_del = 8;
  google.protobuf.Timestamp deleted_at = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message GetRedeemCodeListResponse {
  int32 page = 1;
  int32 page_size = 2;
  int64 total = 3;
  repeated RedeemCodeResponse data = 4;
}

message UpdateRedeemCodeRequest {
  int64 id = 1;
  string title = 2;
  string expiration_at = 3;
  int32 is_del = 4;
}

message UseRedeemCodeRequest {
  int64 redeem_code_id = 1;
  int64 user_id = 2;
}
